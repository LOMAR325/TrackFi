<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackFi - Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header__left">
        <button
          class="header-menu-toggle"
          id="sidebarToggle"
          type="button"
          aria-label="Toggle navigation"
          aria-controls="sidebar"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 7h16M4 12h16M4 17h16"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
            />
          </svg>
        </button>

        <a class="brand" href="./index.html" aria-label="TrackFi home">
          <span class="brand__icon" aria-hidden="true">
            <svg viewBox="0 0 25 22">
              <path
                d="M8.66667 9.75V21M8.66667 9.75H3.04444C2.32889 9.75 1.97111 9.75 1.69767 9.88625C1.45725 10.0061 1.26178 10.1973 1.13928 10.4325C1 10.7 1 11.05 1 11.75V21H8.66667M8.66667 9.75V3C8.66667 2.3 8.66667 1.95 8.80594 1.6825C8.92845 1.44731 9.12391 1.25609 9.36433 1.13625C9.63778 1 9.99556 1 10.7111 1H14.2889C15.0044 1 15.3622 1 15.6357 1.13625C15.8759 1.25625 16.0701 1.4475 16.1941 1.6825C16.3333 1.95 16.3333 2.3 16.3333 3V6M8.66667 21H16.3333M16.3333 6H21.9556C22.6711 6 23.0289 6 23.3036 6.13625C23.5431 6.25651 23.7376 6.44769 23.8594 6.6825C24 6.95 24 7.3 24 8V21H16.3333M16.3333 6V21"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </span>
          <span class="brand__label">TrackFi</span>
        </a>
      </div>

      <div class="user-dropdown" id="userDropdown">
        <button
          class="user-dropdown__trigger"
          id="userDropdownTrigger"
          type="button"
          aria-haspopup="true"
          aria-controls="userDropdownMenu"
          aria-expanded="false"
        >
          <span class="user-dropdown__avatar" aria-hidden="true">V</span>
          <span class="user-dropdown__name" data-user-name>Vladislav</span>
          <span class="user-dropdown__chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="m7 10 5 5 5-5"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </span>
        </button>
        <div class="user-dropdown__menu" id="userDropdownMenu" role="menu" aria-label="User menu"></div>
      </div>
    </header>

    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar__nav" aria-label="Primary navigation">
          <div id="sidebarNav"></div>
        </nav>
      </aside>

      <main class="analytics-page">
        <section class="analytics-page__hero" aria-labelledby="analyticsPageTitle">
          <div class="analytics-page__hero-copy">
            <h1 class="analytics-page__title" id="analyticsPageTitle" data-page-title>
              Analytics
            </h1>
            <p class="analytics-page__subtitle" data-page-subtitle>
              Review all your Analytics
            </p>
          </div>
        </section>

        <section class="transactions-summary-card analytics-summary-card" aria-label="Financial summary">
          <div class="transactions-summary" id="analyticsSummary"></div>
        </section>

        <article class="card overview-card analytics-overview-card" aria-labelledby="analyticsOverviewTitle">
          <div class="card__header">
            <h2 class="card__title" id="analyticsOverviewTitle">Income &amp; Expense Overview</h2>
          </div>
          <div class="card__body">
            <div class="chart-shell chart-shell--overview analytics-overview-card__chart">
              <canvas id="analyticsOverviewChart"></canvas>
            </div>
            <div class="overview-card__legend" aria-label="Overview chart legend">
              <span class="overview-card__legend-item">
                <span class="overview-card__legend-swatch overview-card__legend-swatch--income"></span>
                <span>Income</span>
              </span>
              <span class="overview-card__legend-item">
                <span class="overview-card__legend-swatch overview-card__legend-swatch--expenses"></span>
                <span>Expenses</span>
              </span>
            </div>
          </div>
        </article>

        <article class="card spending-card analytics-spending-card" aria-labelledby="analyticsSpendingTitle">
          <div class="card__header">
            <h2 class="card__title" id="analyticsSpendingTitle">Spending Breakdown</h2>
          </div>
          <div class="card__body analytics-spending-card__body">
            <div class="chart-shell chart-shell--spending">
              <canvas id="analyticsSpendingChart"></canvas>
            </div>
            <div class="analytics-spending-card__legends">
              <div
                class="spending-card__legend analytics-spending-card__legend-column"
                id="analyticsLegendPrimary"
              ></div>
              <div
                class="spending-card__legend analytics-spending-card__legend-column"
                id="analyticsLegendSecondary"
              ></div>
            </div>
          </div>
        </article>
      </main>
    </div>

    <button
      class="sidebar-backdrop"
      id="sidebarBackdrop"
      type="button"
      aria-label="Close navigation"
    ></button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script type="module" src="./assets/js/analytics.js"></script>
</body>
</html>
