<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackFi Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="login-page">
    <header class="app-header login-page__header">
      <div class="app-header__left">
        <a class="brand" href="./login.html" aria-label="TrackFi login">
          <span class="brand__icon" aria-hidden="true">
            <svg viewBox="0 0 25 22">
              <path
                d="M8.66667 9.75V21M8.66667 9.75H3.04444C2.32889 9.75 1.97111 9.75 1.69767 9.88625C1.45725 10.0061 1.26178 10.1973 1.13928 10.4325C1 10.7 1 11.05 1 11.75V21H8.66667M8.66667 9.75V3C8.66667 2.3 8.66667 1.95 8.80594 1.6825C8.92845 1.44731 9.12391 1.25609 9.36433 1.13625C9.63778 1 9.99556 1 10.7111 1H14.2889C15.0044 1 15.3622 1 15.6357 1.13625C15.8759 1.25625 16.0701 1.4475 16.1941 1.6825C16.3333 1.95 16.3333 2.3 16.3333 3V6M8.66667 21H16.3333M16.3333 6H21.9556C22.6711 6 23.0289 6 23.3036 6.13625C23.5431 6.25651 23.7376 6.44769 23.8594 6.6825C24 6.95 24 7.3 24 8V21H16.3333M16.3333 6V21"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </span>
          <span class="brand__label">TrackFi</span>
        </a>
      </div>
    </header>

    <main class="login-page__main">
      <section class="login-card" aria-labelledby="loginTitle">
        <div class="login-card__intro">
          <h1 class="login-card__title" id="loginTitle">Welcome back</h1>
          <p class="login-card__subtitle">Log in to manage your finances</p>
        </div>

        <form class="login-form" id="loginForm" novalidate>
          <label class="login-field" for="loginEmail">
            <span class="login-field__label">Email</span>
            <span class="login-field__control">
              <span class="login-field__icon login-field__icon--mail" aria-hidden="true">
                <svg viewBox="0 0 20 16">
                  <path
                    d="M1.75 1.75L7.858 6.362L7.86 6.364C8.538 6.861 8.877 7.11 9.249 7.206C9.57759 7.29102 9.92241 7.29102 10.251 7.206C10.623 7.11 10.963 6.861 11.643 6.362C11.643 6.362 15.56 3.356 17.75 1.75M0.75 11.55V3.95C0.75 2.83 0.75 2.27 0.968 1.842C1.16 1.465 1.465 1.16 1.842 0.968C2.27 0.75 2.83 0.75 3.95 0.75H15.55C16.67 0.75 17.23 0.75 17.657 0.968C18.034 1.16 18.34 1.465 18.532 1.842C18.75 2.269 18.75 2.829 18.75 3.947V11.554C18.75 12.672 18.75 13.23 18.532 13.658C18.34 14.0345 18.0337 14.3404 17.657 14.532C17.23 14.75 16.671 14.75 15.553 14.75H3.947C2.829 14.75 2.269 14.75 1.842 14.532C1.46569 14.3403 1.15974 14.0343 0.968 13.658C0.75 13.23 0.75 12.67 0.75 11.55Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.5"
                  />
                </svg>
              </span>
              <input
                class="login-field__input"
                id="loginEmail"
                type="email"
                name="email"
                placeholder="Email address"
                autocomplete="email"
                required
              >
            </span>
          </label>

          <label class="login-field" for="loginPassword">
            <span class="login-field__label">Password</span>
            <span class="login-field__control">
              <span class="login-field__icon login-field__icon--password" aria-hidden="true">
                <svg viewBox="0 0 20 20">
                  <path
                    d="M5.25 9V6.75C5.25 4.13 7.38 2 10 2C12.62 2 14.75 4.13 14.75 6.75V9M4.2 18H15.8C16.92 18 17.48 18 17.908 17.782C18.2843 17.5903 18.5903 17.2843 18.782 16.908C19 16.48 19 15.92 19 14.8V12.2C19 11.08 19 10.52 18.782 10.092C18.5903 9.71569 18.2843 9.40974 17.908 9.218C17.48 9 16.92 9 15.8 9H4.2C3.08 9 2.52 9 2.092 9.218C1.71569 9.40974 1.40974 9.71569 1.218 10.092C1 10.52 1 11.08 1 12.2V14.8C1 15.92 1 16.48 1.218 16.908C1.40974 17.2843 1.71569 17.5903 2.092 17.782C2.52 18 3.08 18 4.2 18Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.7"
                  />
                </svg>
              </span>
              <input
                class="login-field__input"
                id="loginPassword"
                type="password"
                name="password"
                placeholder="Password"
                autocomplete="current-password"
                required
              >
            </span>
          </label>

          <button class="login-submit" type="submit">Log in</button>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="./assets/js/login.js"></script>
</body>
</html>
