<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackFi - Goals</title>
  <script>try{document.documentElement.dataset.theme=JSON.parse(localStorage.getItem("trackfi-static:theme")||'"dark"')}catch{document.documentElement.dataset.theme="dark"}</script>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header__left">
        <button
          class="header-menu-toggle"
          id="sidebarToggle"
          type="button"
          aria-label="Toggle navigation"
          aria-controls="sidebar"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 7h16M4 12h16M4 17h16"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
            />
          </svg>
        </button>

        <a class="brand" href="./index.html" aria-label="TrackFi home">
          <span class="brand__icon" aria-hidden="true">
            <svg viewBox="0 0 25 22">
              <path
                d="M8.66667 9.75V21M8.66667 9.75H3.04444C2.32889 9.75 1.97111 9.75 1.69767 9.88625C1.45725 10.0061 1.26178 10.1973 1.13928 10.4325C1 10.7 1 11.05 1 11.75V21H8.66667M8.66667 9.75V3C8.66667 2.3 8.66667 1.95 8.80594 1.6825C8.92845 1.44731 9.12391 1.25609 9.36433 1.13625C9.63778 1 9.99556 1 10.7111 1H14.2889C15.0044 1 15.3622 1 15.6357 1.13625C15.8759 1.25625 16.0701 1.4475 16.1941 1.6825C16.3333 1.95 16.3333 2.3 16.3333 3V6M8.66667 21H16.3333M16.3333 6H21.9556C22.6711 6 23.0289 6 23.3036 6.13625C23.5431 6.25651 23.7376 6.44769 23.8594 6.6825C24 6.95 24 7.3 24 8V21H16.3333M16.3333 6V21"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </span>
          <span class="brand__label">TrackFi</span>
        </a>
      </div>

      <div class="user-dropdown" id="userDropdown">
        <button
          class="user-dropdown__trigger"
          id="userDropdownTrigger"
          type="button"
          aria-haspopup="true"
          aria-controls="userDropdownMenu"
          aria-expanded="false"
        >
          <span class="user-dropdown__avatar" aria-hidden="true">V</span>
          <span class="user-dropdown__name" data-user-name>Vladislav</span>
          <span class="user-dropdown__chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="m7 10 5 5 5-5"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </span>
        </button>
        <div class="user-dropdown__menu" id="userDropdownMenu" role="menu" aria-label="User menu"></div>
      </div>
    </header>

    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar__nav" aria-label="Primary navigation">
          <div id="sidebarNav"></div>
        </nav>
      </aside>

      <main class="goals-page">
        <section class="goals-page__hero" aria-labelledby="goalsPageTitle">
          <div class="goals-page__hero-copy">
            <h1 class="goals-page__title" id="goalsPageTitle" data-page-title>
              Goals
            </h1>
            <p class="goals-page__subtitle" data-page-subtitle>
              Review all your goals.
            </p>
          </div>

          <button class="new-transaction-button new-transaction-button--goal" type="button">
            <span class="new-transaction-button__icon" aria-hidden="true">
              <svg viewBox="0 0 21 20">
                <path
                  d="M6.19126 10H10.3443M10.3443 10H14.4973M10.3443 10V14M10.3443 10V6M10.3443 19C9.11716 19 7.90207 18.7672 6.76837 18.3149C5.63467 17.8626 4.60457 17.1997 3.73687 16.364C2.86918 15.5282 2.18088 14.5361 1.71129 13.4442C1.2417 12.3522 1 11.1819 1 10C1 8.8181 1.2417 7.64778 1.71129 6.55585C2.18088 5.46392 2.86918 4.47177 3.73687 3.63604C4.60457 2.80031 5.63467 2.13738 6.76837 1.68508C7.90207 1.23279 9.11716 1 10.3443 1C12.8225 1 15.1993 1.94821 16.9517 3.63604C18.704 5.32387 19.6885 7.61305 19.6885 10C19.6885 12.3869 18.704 14.6761 16.9517 16.364C15.1993 18.0518 12.8225 19 10.3443 19Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                />
              </svg>
            </span>
            <span data-goals-cta-label>New Goal</span>
          </button>
        </section>

        <section class="transactions-summary-card goals-summary-card" aria-label="Financial summary">
          <div class="transactions-summary" id="goalsSummary"></div>
        </section>

        <section class="goals-manager-card" aria-label="Goals list">
          <div id="goalsManager"></div>
        </section>
      </main>
    </div>

    <button
      class="sidebar-backdrop"
      id="sidebarBackdrop"
      type="button"
      aria-label="Close navigation"
    ></button>
  </div>

  <script type="module" src="./assets/js/goals.js"></script>
</body>
</html>
